# Docker Compose — Productie deployment
#
# Inclusief:
#   - Caddy reverse proxy (TLS automatisch via Let's Encrypt)
#   - Authentik SSO (OAuth2/OIDC identity provider)
#   - OpenAEC Reports (API + frontend)
#
# Gebruik:
#   1. Kopieer .env.example naar .env en vul de secrets in
#   2. docker compose up -d
#   3. Wacht tot Authentik klaar is (~2 min eerste keer)
#   4. Open https://${AUTH_DOMAIN}/if/flow/initial-setup/
#   5. Configureer de OAuth2 application (zie README.md)
#
# Updaten:
#   docker compose pull openaec-reports
#   docker compose up -d openaec-reports

services:

  # ── Reverse Proxy ────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - openaec-reports
      - openaec-reports-rs
      - authentik-server

  # ── Authentik SSO ────────────────────────────────────────────────────

  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - authentik_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS:?Set AUTHENTIK_PG_PASS in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?Set AUTHENTIK_SECRET_KEY in .env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
      # Proxy headers (Caddy stuurt X-Forwarded-*)
      AUTHENTIK_LISTEN__HTTP: 0.0.0.0:9000
      AUTHENTIK_LISTEN__HTTPS: 0.0.0.0:9443
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── OpenAEC Reports ──────────────────────────────────────────────────

  openaec-reports:
    image: ghcr.io/openaec-foundation/openaec-reports:latest
    restart: unless-stopped
    environment:
      # JWT
      OPENAEC_JWT_SECRET: ${OPENAEC_JWT_SECRET:?Set OPENAEC_JWT_SECRET in .env}
      # Cookies
      OPENAEC_COOKIE_DOMAIN: ${OPENAEC_COOKIE_DOMAIN:-.example.com}
      OPENAEC_COOKIE_SECURE: "true"
      # OIDC — Authentik
      OPENAEC_OIDC_ISSUER: https://${AUTH_DOMAIN}/application/o/openaec-reports/
      OPENAEC_OIDC_CLIENT_ID: ${OPENAEC_OIDC_CLIENT_ID:-openaec-reports}
      OPENAEC_OIDC_TRUSTED_CLIENTS: ${OPENAEC_OIDC_TRUSTED_CLIENTS:-}
      # CORS
      CORS_ORIGINS: "https://${REPORT_DOMAIN},http://localhost:5173"
      # Registratie
      OPENAEC_REGISTRATION_ENABLED: ${OPENAEC_REGISTRATION_ENABLED:-false}
      # Tenants
      OPENAEC_TENANTS_ROOT: /app/tenants
      OPENAEC_TENANT_DIR: /app/tenants/${OPENAEC_DEFAULT_BRAND:-default}
      OPENAEC_DEFAULT_BRAND: ${OPENAEC_DEFAULT_BRAND:-default}
    volumes:
      - openaec_data:/app/data
      - openaec_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── OpenAEC Reports — Rust API ───────────────────────────────────────

  openaec-reports-rs:
    build:
      context: ..
      dockerfile: rust/Dockerfile
    restart: unless-stopped
    environment:
      OPENAEC_FONTS_DIR: /app/fonts
      OPENAEC_TENANTS_ROOT: /app/tenants
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
  authentik_db:
  authentik_redis:
  authentik_media:
  authentik_templates:
  openaec_data:
  openaec_uploads:
