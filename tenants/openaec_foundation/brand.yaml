# ==============================================================================
# OpenAEC Foundation — Brand Configuration
# ==============================================================================
# Gebaseerd op: DESIGN-SYSTEM.md v0.3 (March 2026)
# Alle kleuren, fonts en layout conform het OpenAEC brandboek.
# ==============================================================================

brand:
  name: "OpenAEC Foundation"
  slug: "openaec-foundation"

colors:
  # Primary
  primary: "#D97706"           # Construction Amber — buttons, links, accents
  secondary: "#36363E"         # Deep Forge — dark backgrounds, text on light
  # Secondary
  signal_orange: "#EA580C"     # Hover states, CTAs, warnings
  warm_gold: "#F59E0B"         # Highlights, badges, secondary accents
  scaffold_gray: "#A1A1AA"     # Secondary text, borders, subtle UI
  # Backgrounds
  blueprint_white: "#FAFAF9"   # Light background (warm, not clinical)
  concrete: "#F5F5F4"          # Cards, code blocks, sections
  night_build: "#2A2A32"       # Darkest background, hero sections
  # Semantic
  accent: "#16A34A"            # Success — passed, confirmed, OK
  warning: "#DC2626"           # Error — failed, destructive, critical
  info: "#2563EB"              # Informational, neutral
  # Text
  text: "#36363E"              # Primary text (Deep Forge)
  text_accent: "#D97706"       # Amber accent text
  text_light: "#A1A1AA"        # Scaffold Gray — secondary text
  # Table
  table_header_bg: "#36363E"   # Deep Forge header
  table_header_text: "#FAFAF9" # Blueprint White header text
  table_footer_bg: "#D97706"   # Amber footer
  # Backgrounds (component-level)
  background: "#FAFAF9"        # Blueprint White — page background
  background_alt: "#F5F5F4"    # Concrete — zebra stripes, header bg
  # Borders
  rule: "#E7E5E4"              # Grid lines, borders
  separator: "#E7E5E4"         # Default border color
  # Gradient (for reference — rendered programmatically)
  gradient_start: "#D97706"    # Amber
  gradient_mid: "#F59E0B"      # Warm Gold
  gradient_end: "#EA580C"      # Signal Orange

fonts:
  heading: "SpaceGrotesk-Bold"
  subheading: "SpaceGrotesk-Medium"
  body: "Inter-Regular"
  medium: "Inter-Medium"
  semibold: "Inter-SemiBold"
  bold: "Inter-Bold"
  # Fallbacks (als custom fonts niet beschikbaar)
  heading_fb: "Helvetica-Bold"
  body_fb: "Helvetica"

font_files:
  SpaceGrotesk-Bold: "fonts/SpaceGrotesk-Bold.ttf"
  SpaceGrotesk-Medium: "fonts/SpaceGrotesk-Medium.ttf"
  SpaceGrotesk-Regular: "fonts/SpaceGrotesk-Regular.ttf"
  Inter-Regular: "fonts/Inter-Regular.ttf"
  Inter-Medium: "fonts/Inter-Medium.ttf"
  Inter-SemiBold: "fonts/Inter-SemiBold.ttf"
  Inter-Bold: "fonts/Inter-Bold.ttf"

logos:
  main: "logos/openaec-logo-amber-on-dark-2x.png"
  main_hires: "logos/openaec-logo-amber-on-dark-3x.png"
  light: "logos/openaec-logo-dark-on-light-2x.png"
  white: "logos/openaec-logo-white-on-dark-2x.png"
  symbol: "logos/openaec-symbol-amber-on-dark-2x.png"
  symbol_transparent: "logos/openaec-symbol-transparent-2x.png"

contact:
  name: "Stichting OpenAEC Foundation"
  tagline: "Build free. Build together."
  secondary_tagline: "Free and open-source tools for the built environment."
  website: "openaec.org"

# ==============================================================================
# HEADER — 38mm, Deep Forge achtergrond, amber gradient onderrand
# ==============================================================================
header:
  height: 38
  elements:
    # Stationery levert: achtergrond, blueprint pattern, logo, amber strip
    # Hier alleen dynamische tekst (project metadata rechts)
    - type: text
      content: "{project_number}"
      x: 195
      y: 28
      font: "$semibold"
      size: 7.5
      color: "#FAFAF9"
      align: right

    - type: text
      content: "{project}"
      x: 195
      y: 22
      font: "$body"
      size: 7.0
      color: "#A1A1AA"
      align: right

# ==============================================================================
# FOOTER — 15mm, Deep Forge achtergrond, amber gradient bovenrand
# ==============================================================================
footer:
  height: 15
  elements:
    # Stationery levert: achtergrond, amber strip, "OpenAEC" wordmark, "openaec.org"
    # Hier alleen dynamisch paginanummer
    - type: text
      content: "Pagina {page}"
      x: 195
      y: 5
      font: "$body"
      size: 7.0
      color: "$primary"
      align: right

# ==============================================================================
# STYLES — Paragraph styles conform design system typography
# ==============================================================================
styles:
  Normal:
    fontName: "Inter-Regular"
    fontSize: 9.5
    leading: 13.5           # ~1.4x voor body text (16px equivalent: 1.6 line-height)
    textColor: "#36363E"
  Heading1:
    fontName: "SpaceGrotesk-Bold"
    fontSize: 18.0
    leading: 21.6           # 1.2 line-height
    textColor: "#36363E"
    spaceBefore: 14
    spaceAfter: 6
  Heading2:
    fontName: "SpaceGrotesk-Bold"
    fontSize: 13.0
    leading: 15.6           # 1.2 line-height
    textColor: "#36363E"
    spaceBefore: 10
    spaceAfter: 4
  Heading3:
    fontName: "SpaceGrotesk-Medium"
    fontSize: 11.0
    leading: 14.3           # 1.3 line-height
    textColor: "#36363E"
    spaceBefore: 8
    spaceAfter: 3

# ==============================================================================
# PAGES — Page-specific layout configuratie
# ==============================================================================
pages:
  cover:
    # Stationery PDF levert alle statische visuals (achtergrond, logo,
    # blueprint pattern, badges, tagline). Alleen titel/subtitel dynamisch.
    stationery_only: true

    # Titel (dynamisch — gerenderd over stationery)
    title_size_ref: 28.0
    title_x_ref: 54.0
    title_y_ref: 95.0
    title_color: "#36363E"

    # Subtitel (dynamisch — gerenderd over stationery)
    subtitle_size_ref: 16.0
    subtitle_x_ref: 54.0
    subtitle_y_ref: 65.0
    subtitle_color: "#A1A1AA"

  backcover:
    bg_color: "#36363E"

    # Amber accent rectangle
    accent_rect:
      - [0, 0]
      - [0, 140]
      - [595, 140]
      - [595, 0]
    accent_color: "#2A2A32"

    # Logo
    logo_key: "main"
    logo_x_ref: 168
    logo_y_ref: 450
    logo_w_ref: 260

    # Tagline
    tagline: "Build free. Build together."
    tagline_font: "SpaceGrotesk-Bold"
    tagline_size: 14.0
    tagline_color: "#D97706"
    tagline_x_ref: 298
    tagline_y_ref: 380
    tagline_align: center

    # Contact
    contact_x_ref: 298
    contact_y_ref: 180
    contact_line_h_ref: 16
    contact_name_size_ref: 10
    contact_detail_size_ref: 8.5

  colofon:
    # Rapport titel
    report_type_font: "SpaceGrotesk-Bold"
    report_type_size: 22.0
    report_type_color: "#36363E"
    report_type_x_pt: 70.9
    report_type_y_pt: 57.3
    # Subtitel
    subtitle_font: "Inter-Regular"
    subtitle_size: 14.0
    subtitle_color: "#A1A1AA"
    subtitle_x_pt: 70.9
    subtitle_y_pt: 86.8
    # Label kolom
    label_x_pt: 103
    value_x_pt: 229
    # Kleuren
    first_labels_color: "#36363E"
    other_labels_color: "#D97706"
    value_color: "#36363E"
    # Fonts
    label_font: "SpaceGrotesk-Bold"
    label_size: 10.0
    value_font: "Inter-Regular"
    value_size: 10.0
    # Scheidingslijnen
    line_x1_pt: 102
    line_x2_pt: 420
    line_stroke_pt: 0.25
    line_color: "#E7E5E4"
    # Footer (amber blok)
    footer_rect: [0, 771, 282, 842]
    footer_rect_color: "#D97706"
    # Paginanummer
    page_num_x_pt: 534
    page_num_y_pt: 796.3
    page_num_font: "Inter-Regular"
    page_num_size: 9.5
    page_num_color: "#D97706"
    # Veld volgorde met y_pt posities
    fields:
      - {label: "Project", type: "project", y_pt: 320.8}
      - {label: "Client", type: "client", y_pt: 368.8}
      - {type: "line", y_pt: 517}
      - {label: "Author", type: "author", y_pt: 488.8}
      - {label: "Applicable norms", type: "norms", y_pt: 524.8}
      - {type: "line", y_pt: 542}
      - {label: "Document description", type: "document_description", y_pt: 548.8}
      - {type: "line", y_pt: 566}
      - {label: "Report date", type: "date", y_pt: 572.8}
      - {type: "line", y_pt: 590}
      - {label: "Phase", type: "phase", y_pt: 596.8}
      - {type: "line", y_pt: 614}
      - {label: "Status", type: "status", y_pt: 620.8}
      - {type: "line", y_pt: 638}
      - {label: "Document code", type: "document_code", y_pt: 644.8}

  toc:
    title: "Table of contents"
    title_font: "SpaceGrotesk-Bold"
    title_size: 18.0
    title_color: "#36363E"
    title_x_pt: 90
    title_y_pt: 74.9
    # Level 1 (chapters)
    level1_font: "SpaceGrotesk-Bold"
    level1_size: 12.0
    level1_color: "#D97706"
    # Level 2 (subsections)
    level2_font: "Inter-Regular"
    level2_size: 9.5
    level2_color: "#36363E"
    # Columns
    number_x_pt: 90
    text_x_pt: 160.9
    page_x_pt: 515.4
    # Spacing
    chapter_spacing_pt: 39
    item_spacing_pt: 17

  appendix_divider:
    bg_color: "#36363E"
    # Amber accent blok linksonder
    accent_rect: [0, 771, 282, 842]
    accent_color: "#D97706"
    # Bijlage nummer
    number_font: "SpaceGrotesk-Bold"
    number_size: 41.4
    number_color: "#D97706"
    number_x_pt: 103
    number_y_pt: 193.9
    # Titel
    title_font: "Inter-Regular"
    title_size: 41.4
    title_color: "#FAFAF9"
    title_x_pt: 136.1
    title_first_y_pt: 262.2
    title_line_spacing_pt: 66.4
    # Tagline
    tagline: "Build free. Build together."
    tagline_font: "SpaceGrotesk-Bold"
    tagline_size: 17.9
    tagline_color: "#D97706"
    tagline_x_pt: 330.5
    tagline_y_pt: 785.1

# ==============================================================================
# STATIONERY — Page background configuration
# ==============================================================================
stationery:
  cover:
    source: "stationery/cover.pdf"
    text_zones: []
  colofon:
    source: "stationery/content.pdf"
    header_footer: "content"
    text_zones: []
  content:
    source: "stationery/content.pdf"
    header_footer: "content"
    content_frame:
      x_pt: 34.0
      y_pt: 57.0
      width_pt: 527.3
      height_pt: 677.0
  toc:
    source: "stationery/content.pdf"
    header_footer: "content"
  appendix_divider:
    source: ""
    header_footer: null
    text_zones: []
  backcover:
    source: ""
    header_footer: null
    text_zones: []

# ==============================================================================
# MODULES — Component-specific styling
# ==============================================================================
modules:
  table:
    header_bg: "$colors.table_header_bg"
    header_text_color: "#FAFAF9"
    body_font: "Inter-Regular"
    body_size: 9.0
    footer_bg: "$colors.table_footer_bg"
    grid_color: "$colors.separator"
  calculation:
    title_color: "$colors.primary"
    accent_line_color: "$colors.warm_gold"
  check:
    pass_color: "$colors.accent"
    fail_color: "$colors.warning"
