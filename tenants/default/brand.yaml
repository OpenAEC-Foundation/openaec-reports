# ==============================================================================
# Default — Brand Configuration (open-source MVP)
# ==============================================================================
# Generieke, tenant-neutrale branding die meekomt met de public repo.
# Bedoeld als startpunt voor nieuwe tenants: kopieer deze directory,
# vervang kleuren/logo/fonts en stel OPENAEC_TENANT_DIR in.
#
# Fonts: Inter (OFL) + Space Grotesk (OFL) — vrij te distribueren.
# ==============================================================================

brand:
  name: "Default"
  slug: "default"

colors:
  # Primary
  primary: "#2563EB"           # Neutraal blauw — links, accents
  secondary: "#1E293B"         # Slate 800 — dark backgrounds, text
  # Secondary
  signal_orange: "#F97316"     # Hover states, CTAs, warnings
  warm_gold: "#F59E0B"         # Highlights, badges
  scaffold_gray: "#94A3B8"     # Secondary text, borders
  # Backgrounds
  blueprint_white: "#FFFFFF"   # Light background
  concrete: "#F1F5F9"          # Cards, sections
  night_build: "#0F172A"       # Darkest background
  # Semantic
  accent: "#16A34A"            # Success
  warning: "#DC2626"           # Error
  info: "#2563EB"              # Informational
  # Text
  text: "#1E293B"              # Primary text
  text_accent: "#2563EB"       # Blue accent text
  text_light: "#64748B"        # Secondary text
  # Table
  table_header_bg: "#1E293B"
  table_header_text: "#FFFFFF"
  table_footer_bg: "#2563EB"
  # Backgrounds (component-level)
  background: "#FFFFFF"
  background_alt: "#F1F5F9"
  # Borders
  rule: "#E2E8F0"
  separator: "#E2E8F0"
  # Gradient
  gradient_start: "#2563EB"
  gradient_mid: "#3B82F6"
  gradient_end: "#1D4ED8"

fonts:
  heading: "SpaceGrotesk-Bold"
  subheading: "SpaceGrotesk-Medium"
  body: "Inter-Regular"
  medium: "Inter-Medium"
  semibold: "Inter-SemiBold"
  bold: "Inter-Bold"
  heading_fb: "Helvetica-Bold"
  body_fb: "Helvetica"

font_files:
  SpaceGrotesk-Bold: "fonts/SpaceGrotesk-Bold.ttf"
  SpaceGrotesk-Medium: "fonts/SpaceGrotesk-Medium.ttf"
  SpaceGrotesk-Regular: "fonts/SpaceGrotesk-Regular.ttf"
  Inter-Regular: "fonts/Inter-Regular.ttf"
  Inter-Medium: "fonts/Inter-Medium.ttf"
  Inter-SemiBold: "fonts/Inter-SemiBold.ttf"
  Inter-Bold: "fonts/Inter-Bold.ttf"

logos:
  main: "logos/default-logo.svg"
  light: "logos/default-logo.svg"
  white: "logos/default-logo.svg"
  symbol: "logos/default-logo.svg"

contact:
  name: ""
  tagline: ""
  secondary_tagline: ""
  website: ""

# ==============================================================================
# HEADER — 38mm, dark achtergrond, primary gradient onderrand
# ==============================================================================
header:
  height: 38
  elements:
    - type: line
      x: 0
      y: 0
      width: 210
      color: "$primary"
      stroke_width: 1.4

    - type: text
      content: "{project_number}"
      x: 195
      y: 28
      font: "$semibold"
      size: 7.5
      color: "#FFFFFF"
      align: right

    - type: text
      content: "{project}"
      x: 195
      y: 22
      font: "$body"
      size: 7.0
      color: "#94A3B8"
      align: right

# ==============================================================================
# FOOTER — 15mm, dark achtergrond, primary gradient bovenrand
# ==============================================================================
footer:
  height: 15
  elements:
    - type: line
      x: 0
      y: 13
      width: 210
      color: "$primary"
      stroke_width: 1.0

    - type: text
      content: "Pagina {page}"
      x: 195
      y: 5
      font: "$body"
      size: 7.0
      color: "$primary"
      align: right

# ==============================================================================
# STYLES — Paragraph styles
# ==============================================================================
styles:
  Normal:
    fontName: "Inter-Regular"
    fontSize: 9.5
    leading: 13.5
    textColor: "#1E293B"
  Heading1:
    fontName: "SpaceGrotesk-Bold"
    fontSize: 18.0
    leading: 21.6
    textColor: "#1E293B"
    spaceBefore: 14
    spaceAfter: 6
  Heading2:
    fontName: "SpaceGrotesk-Bold"
    fontSize: 13.0
    leading: 15.6
    textColor: "#1E293B"
    spaceBefore: 10
    spaceAfter: 4
  Heading3:
    fontName: "SpaceGrotesk-Medium"
    fontSize: 11.0
    leading: 14.3
    textColor: "#1E293B"
    spaceBefore: 8
    spaceAfter: 3

