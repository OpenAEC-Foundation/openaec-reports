# Symitech BIC Factuur — BIC controle resultaten (content portrait)
# Pixel-exact gemeten uit extraction_results.json + 1.0mm y-correctie (2026-03-01)
# Stationery: SCHOON canvas (alleen header/footer grafische balk)
# Engine rendert: ALLES — labels, waarden, sectie-lijnen, subtotaal-lijnen
#
# === REFERENTIE STYLING ===
# ALLE labels links:   font=Arial-BoldMT (heading), color=#94571e (secondary)
# ALLE waarden rechts: font=ArialMT (body), color=#000000 (text)
# Uitzondering TOTAAL: label=secondary, waarden=primary (#006fab), font=heading
#
# === KOLOM LAYOUT (right-aligned x1 posities) ===
# Labels links:              x0=55.2pt → 19.5mm (left-aligned)
# Conform opdracht (right):  x1=419.9pt → 148.1mm
# Werkelijke kosten (right): x1=540.5pt → 190.6mm

