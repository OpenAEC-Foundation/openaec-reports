# =============================================================
# 3BM Cooperatie - Page Layout Definitions
# =============================================================
# Gedeelde marges en content areas voor alle pagina-types
# =============================================================

page:
  width: 595.3
  height: 841.9

# --- Content marges (afgeleid uit BBL rapport) ---
margins:
  left: 90.0
  right: 64.0        # pagina breedte - 531.3
  top: 74.9           # eerste tekst y_td
  bottom: 48.4        # onder footer/paginanummer zone

# --- Content area (beschikbaar voor tekst/tabellen) ---
content_area:
  x: 90.0
  y_td_start: 74.9    # bovenkant content (top-down)
  y_td_end: 780.0     # onderkant content (boven paginanummer)
  width: 441.3         # 531.3 - 90.0
  height: 705.1        # bruikbare hoogte

# --- Paginanummer (alle pagina's behalve cover) ---
page_number:
  x: 533.0
  y_td: 793.5
  font: GothamBook
  size: 9.5
  color: "#401246"

# --- TOC specifiek ---
toc:
  title:
    text: "Inhoud"
    x: 90.0
    y_td: 74.9
    font: GothamBook
    size: 18.0
    color: "#401246"
  
  start_y_td: 127.2    # eerste entry positie
  
  # Kolom posities
  columns:
    number_x: 90.0      # hoofdstuknummer
    title_x: 160.9      # titel tekst
    page_x: 515.4       # paginanummer (rechts uitgelijnd)
  
  # Hoofdstuk entries (niveau 1)
  chapter:
    font: GothamBook
    size: 12.0
    color: "#56B49B"     # teal
    line_height: 20.0    # afstand tot volgende sub-entry
    spacing_before: 17.0 # extra ruimte voor hoofdstuk
  
  # Sub-entries (niveau 2)
  section:
    font: GothamBook
    size: 9.5
    color: "#401246"     # donkerpaars
    line_height: 17.3    # afstand tussen sub-entries
