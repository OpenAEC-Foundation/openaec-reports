# Symitech BIC Factuur — BIC controle resultaten (content portrait)
# Pixel-exact gemeten uit extraction_results.json content_portrait (2026-03-01)
# Stationery: SCHOON canvas (alleen header/footer grafische balk)
# Engine rendert: ALLES — labels, waarden, sectie-lijnen, subtotaal-lijnen
#
# Coördinaten: PyMuPDF y0 pt → mm (×0.352778), top-down
# Pagina: A4 portrait 595.3×841.9pt (210×297mm)
#
# === REFERENTIE STYLING ===
# ALLE labels links:   font=Arial-BoldMT (heading), color=#94571e (secondary)
# ALLE waarden rechts: font=ArialMT (body), color=#000000 (text)
# Uitzondering TOTAAL: label=secondary, waarden=primary (#006fab), font=heading
#
# === KOLOM LAYOUT (right-aligned x1 posities) ===
# Labels links:              x0=55.2pt → 19.5mm (left-aligned)
# Conform opdracht (right):  x1=419.9pt → 148.1mm
# Werkelijke kosten (right): x1=540.5pt → 190.6mm
#
# === LIJN PATRONEN ===
# Blauwe dubbele lijn (sectie):   3.0pt + 0.75pt, x=49.7→227.2pt (17.5→80.2mm)
# Bruine enkele lijn (subtotaal): 2.25pt, x=283.5→545.8pt (100.0→192.5mm)

name: bic_controles
stationery: content_portrait_stationery.pdf

# ============================================================
# Decoratieve lijnen
# ============================================================
line_zones:
  # --- Sectie "BIC Controles" dubbele lijn ---
  # y=125.5pt → 44.3mm (dik), y=128.2pt → 45.2mm (dun)
  - x0_mm: 17.5
    y_mm: 44.3
    x1_mm: 80.2
    width_pt: 3.0
    color: "primary"
  - x0_mm: 17.5
    y_mm: 45.2
    x1_mm: 80.2
    width_pt: 0.75
    color: "primary"

  # --- Subtotaal BIC: y=233.2pt → 82.3mm ---
  - x0_mm: 100.0
    y_mm: 82.3
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

  # --- Sectie "Reinigen tijdens BIC" dubbele lijn ---
  # y=281.8pt → 99.4mm (dik), y=284.5pt → 100.4mm (dun)
  - x0_mm: 17.5
    y_mm: 99.4
    x1_mm: 80.2
    width_pt: 3.0
    color: "primary"
  - x0_mm: 17.5
    y_mm: 100.4
    x1_mm: 80.2
    width_pt: 0.75
    color: "primary"

  # --- Subtotaal Reiniging: y=297.5pt → 105.0mm ---
  - x0_mm: 100.0
    y_mm: 105.0
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

  # --- Sectie "Additioneel tijdens BIC" dubbele lijn ---
  # y=334.5pt → 118.0mm (dik), y=337.2pt → 118.9mm (dun)
  - x0_mm: 17.5
    y_mm: 118.0
    x1_mm: 80.2
    width_pt: 3.0
    color: "primary"
  - x0_mm: 17.5
    y_mm: 118.9
    x1_mm: 80.2
    width_pt: 0.75
    color: "primary"

  # --- Subtotaal Additioneel: y=361.7pt → 127.6mm ---
  - x0_mm: 100.0
    y_mm: 127.6
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

  # --- Sectie "Overzicht samenvatting" dubbele lijn ---
  # y=433.3pt → 152.8mm (dik), y=436.0pt → 153.8mm (dun)
  - x0_mm: 17.5
    y_mm: 152.8
    x1_mm: 80.2
    width_pt: 3.0
    color: "primary"
  - x0_mm: 17.5
    y_mm: 153.8
    x1_mm: 80.2
    width_pt: 0.75
    color: "primary"

  # --- Totaal scheidingslijn: y=506.5pt → 178.7mm ---
  - x0_mm: 100.0
    y_mm: 178.7
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

