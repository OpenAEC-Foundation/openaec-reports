# Symitech Location Detail — YAML module definition
# Equivalent of LocationDetailModule (location_detail.py)
#
# Locatie informatiepagina met opdrachtgever- en locatiegegevens,
# plus een optionele foto.

name: location_detail
tenant: symitech

style:
  title_height: 28.0
  section_header_height: 22.0
  row_height: 16.0
  section_gap: 14.0
  double_line_gap: 2.7
  label_indent: 4.0
  label_col_frac: 0.35
  photo_max_height: 300.0
  photo_top_margin: 16.0
  placeholder_height: 60.0
  bottom_padding: 8.0

elements:
  - type: title
    field: title
    default: "Locatie"

  - type: form_section
    data_key: client
    title_field: section_title
    skip_empty: true
    fields:
      - { key: name, label: "Naam" }
      - { key: address, label: "Adres" }
      - { key: city, label: "Plaats" }

  - type: form_section
    data_key: location
    title_field: section_title
    skip_empty: true
    fields:
      - { key: name, label: "Naam" }
      - { key: address, label: "Adres" }
      - { key: city, label: "Plaats" }
      - { key: code, label: "Locatiecode" }
      - { key: provision, label: "Voorziening" }
      - { key: object, label: "Object" }

  - type: photo
    field: photo_path
    placeholder_text: "[LOCATIEFOTO]"
