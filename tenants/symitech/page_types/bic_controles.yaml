# Symitech BIC Factuur — controle resultaten
name: bic_controles
stationery: content_portrait_stationery.pdf

text_zones:
  - bind: location.name
    x_mm: 185
    y_mm: 30
    align: right
    font: heading
    size: 14
    color: primary

table:
  data_bind: bic_sections
  origin:
    x_mm: 20
    y_mm: 80
  row_height_mm: 5.6
  max_y_mm: 260
  columns:
    - { field: label, width_mm: 85, align: left }
    - { field: ref_value, width_mm: 42, align: right }
    - { field: actual_value, width_mm: 42, align: right }
