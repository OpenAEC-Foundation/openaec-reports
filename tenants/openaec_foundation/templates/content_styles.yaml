# ==============================================================================
# OpenAEC Foundation — Content styling rules
# ==============================================================================
# Conform DESIGN-SYSTEM.md sectie 2.2 (Typography) en 4.3 (A4 Report)
# ==============================================================================

# Body text
body:
  font: "Inter-Regular"
  size: 9.5              # ~0.9rem equivalent for print
  leading: 16.2          # 1.7 line-height
  color: "#36363E"       # Deep Forge
  alignment: justify
  max_width_pt: 527.3    # 70ch target

# Section headings
heading1:
  font: "SpaceGrotesk-Bold"
  size: 18.0             # ~1.75rem equivalent
  leading: 21.6          # 1.2 line-height
  color: "#36363E"
  space_before_pt: 22.7  # 8mm
  space_after_pt: 8.5    # 3mm

heading2:
  font: "SpaceGrotesk-Bold"
  size: 13.0             # ~1.25rem equivalent
  leading: 15.6          # 1.2 line-height
  color: "#36363E"
  space_before_pt: 17.0  # 6mm
  space_after_pt: 5.7    # 2mm

heading3:
  font: "SpaceGrotesk-Medium"
  size: 11.0             # ~1.1rem equivalent
  leading: 14.3          # 1.3 line-height
  color: "#36363E"
  space_before_pt: 22.7  # 8mm
  space_after_pt: 4.3    # 1.5mm

# Emphasis
bold:
  font: "Inter-Bold"

medium:
  font: "Inter-Medium"

# Small text
small:
  font: "Inter-Regular"
  size: 8.0              # ~0.875rem equivalent
  color: "#36363E"

# Extra small
xs:
  font: "Inter-Regular"
  size: 7.0              # ~0.75rem equivalent
  color: "#A1A1AA"       # Scaffold Gray

# Section labels (monospace style)
section_label:
  font: "Inter-SemiBold"
  size: 7.0
  color: "#D97706"       # Amber
  text_transform: uppercase
  letter_spacing: 0.1

# Table styles
table:
  header:
    font: "Inter-SemiBold"
    size: 7.0
    color: "#57534E"
    bg_color: "#F5F5F4"  # Concrete
    text_transform: uppercase
    letter_spacing: 0.05
  cell:
    font: "Inter-Regular"
    size: 8.0
    padding_h: 12
    padding_v: 8
    border_color: "#F5F5F4"
  row_hover_bg: "#FAFAF9" # Blueprint White

# Alerts/notes
alert:
  padding: 16
  border_radius: 8
  border_left_width: 4
  font: "Inter-Regular"
  size: 8.0
  variants:
    info:
      bg: "#EFF6FF"
      border: "#2563EB"
      text: "#1E40AF"
    success:
      bg: "#F0FDF4"
      border: "#16A34A"
      text: "#166534"
    warning:
      bg: "#FFFBEB"
      border: "#D97706"
      text: "#92400E"
    error:
      bg: "#FEF2F2"
      border: "#DC2626"
      text: "#991B1B"

# Blockquote
blockquote:
  border_left_width: 4
  border_color: "#D97706"  # Amber
  padding: 16
  bg: "#F5F5F4"           # Concrete
  font_style: italic
