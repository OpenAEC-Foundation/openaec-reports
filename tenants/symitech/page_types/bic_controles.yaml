  - x0_mm: 100.0
    y_mm: 104.9
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

  # --- Sectie "Additioneel tijdens BIC" dubbele lijn ---
  # Dikke lijn: y=334.5pt → 118.0mm
  - x0_mm: 17.5
    y_mm: 118.0
    x1_mm: 80.1
    width_pt: 3.0
    color: "primary"
  # Dunne lijn: y=337.2pt → 118.9mm
  - x0_mm: 17.5
    y_mm: 118.9
    x1_mm: 80.1
    width_pt: 0.75
    color: "primary"

  # --- Subtotaal Additioneel: y=361.7pt → 127.6mm ---
  - x0_mm: 100.0
    y_mm: 127.6
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

  # --- Sectie "Overzicht samenvatting" dubbele lijn ---
  # Dikke lijn: y=433.3pt → 152.8mm
  - x0_mm: 17.5
    y_mm: 152.8
    x1_mm: 80.1
    width_pt: 3.0
    color: "primary"
  # Dunne lijn: y=436.0pt → 153.8mm
  - x0_mm: 17.5
