name: Release Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM
          - os: macos-14
            target: x86_64-apple-darwin
            label: macOS-Intel

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenAEC Reports ${{ github.ref_name }}"
          releaseBody: |
            ## OpenAEC Reports ${{ github.ref_name }}

            Desktop applicatie voor het genereren van professionele engineering rapporten.

            **Dit is een alpha release** — installeer alleen voor testdoeleinden.

            ### Installatie
            - **Windows:** Download `.exe` en voer uit
            - **macOS (Apple Silicon):** Download `aarch64.dmg`
            - **macOS (Intel):** Download `x64.dmg`
            - **Linux:** Download `.deb` of `.AppImage`

            ### Opmerkingen
            - PDF generatie via cloud API (report.open-aec.com)
            - Login via Authentik SSO
            - Geen code signing (alpha) — OS waarschuwing mogelijk bij installatie
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}
