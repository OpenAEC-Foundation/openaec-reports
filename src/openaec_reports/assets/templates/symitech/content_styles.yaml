# =============================================================
# Symitech - Content Block Styles
# =============================================================
#
# Definieert hoe elk type content block wordt gerenderd.
# Afgeleid van: tenants/symitech/brand.yaml fonts/colors/styles
#
# X-posities (tabs):
#   90.0  = Hoofdstuk nummer (H1)
#   108.0 = Hoofdstuk titel (H1)
#   125.4 = Paragraaf nummer (H2) + body text + bullet marker
#   143.4 = Bullet text (ingesprongen)
#   147.0 = Paragraaf titel (H2)
#
# =============================================================

# --- Kleuren ---
colors:
  primary: "#006FAB"
  secondary: "#94571E"
  white: "#FFFFFF"
  red: "#FF0000"

# --- Fonts ---
fonts:
  book: Helvetica
  bold: Helvetica-Bold
  book_italic: Helvetica-Oblique
  symbol: SymbolMT

# =============================================================
# BLOCK TYPES
# =============================================================

blocks:

  # --- H1: Hoofdstuk titel ---
  heading_1:
    number:
      x: 90.0
      font: Helvetica-Bold
      size: 18.0
      color: "#006FAB"
    title:
      x: 108.0
      font: Helvetica-Bold
      size: 18.0
      color: "#006FAB"
    spacing_before: 0.0
    spacing_after: 33.9

  # --- H2: Paragraaf titel ---
  heading_2:
    number:
      x: 125.4
      font: Helvetica-Bold
      size: 10.0
      color: "#94571E"
    title:
      x: 147.0
      font: Helvetica-Bold
      size: 13.0
      color: "#94571E"
    spacing_before: 30.0
    spacing_after: 20.5

  # --- Body text (paragraaf) ---
  paragraph:
    x: 125.4
    font: Helvetica
    size: 9.5
    color: "#000000"
    line_height: 12.3
    max_width: 393.0
    spacing_before: 12.0
    spacing_after: 12.0

  # --- Bullet list ---
  bullet_list:
    marker:
      x: 125.4
      font: Helvetica
      size: 9.5
      color: "#000000"
      character: "\u2022"
    text:
      x: 143.4
      font: Helvetica
      size: 9.5
      color: "#000000"
      line_height: 12.0
      max_width: 387.0
    spacing_between: 10.1
    spacing_before: 0.0
    spacing_after: 12.0

  # --- Tabel ---
  table:
    header:
      font: Helvetica-Bold
      size: 12.0
      color: "#FFFFFF"
      background: "#006FAB"
      height: 24.0
    body:
      font: Helvetica
      size: 9.0
      color: "#000000"
      line_height: 20.8
      alternating_bg: null
    title:
      font: Helvetica-Bold
      size: 9.5
      color: "#000000"
    stripe_color: "#F5F5F5"
    grid_color: "#CCCCCC"
    header_grid_color: "#FFFFFF"
    x: 125.4
    max_width: 415.9
    spacing_before: 20.0
    spacing_after: 20.0

  # --- Image ---
  image:
    caption:
      font: Helvetica
      size: 8.0
      color: "#000000"
    error:
      font: Helvetica
      size: 9.5
      color: "#FF0000"

  # --- Map ---
  map:
    caption:
      font: Helvetica
      size: 8.0
      color: "#000000"
    error:
      font: Helvetica
      size: 9.5
      color: "#FF0000"

  # --- Cadastral info ---
  cadastral:
    background: "#F8F8F8"
    accent_color: "#006FAB"
    title:
      font: Helvetica-Bold
      size: 8.5
      color: "#000000"
    body:
      font: Helvetica
      size: 8.5
      color: "#000000"

  # --- Calculation ---
  calculation:
    background: "#F5F5F5"
    title:
      font: Helvetica-Bold
      size: 9.5
      color: "#000000"
    body:
      font: Helvetica
      size: 9.5
      color: "#000000"
    result:
      font: Helvetica-Bold
      size: 9.5
      color: "#006FAB"
    reference:
      font: Helvetica
      size: 8.0
      color: "#006FAB"

  # --- Check ---
  check:
    background: "#F5F5F5"
    title:
      font: Helvetica-Bold
      size: 9.5
      color: "#000000"
    body:
      font: Helvetica
      size: 9.5
      color: "#000000"
    result:
      font: Helvetica-Bold
      size: 9.5
    ok_color: "#006FAB"
    fail_color: "#FF0000"

  # --- Superscript (m2, etc.) ---
  superscript:
    font: Helvetica
    size: 6.0
    color: "#000000"
    y_offset: -4.0

# =============================================================
# PAGE NUMBER (herhaling voor completeness)
# =============================================================
page_number:
  x: 533.0
  y_td: 793.5
  font: Helvetica
  size: 9.5
  color: "#006FAB"
