# Symitech BIC Factuur — voorzieningen en objecten overzicht (landscape)
# Gebaseerd op detail_weergave layout (zelfde landscape stationery)
# Stationery: LEEG — engine rendert alles
# Pagina: A4 landscape 841.9×595.3pt (297×210mm)

name: objecten
stationery: content_landscape_stationery.pdf

line_zones:
  # Dubbele blauwe lijn BOVEN tabel
  - x0_mm: 21.9
    y_mm: 31.0
    x1_mm: 80.1
    width_pt: 3.0
    color: "primary"
  - x0_mm: 21.9
    y_mm: 32.0
    x1_mm: 80.1
    width_pt: 0.75
    color: "primary"

  # Dubbele blauwe lijn ONDER tabel
  - x0_mm: 21.9
    y_mm: 192.4
    x1_mm: 80.1
    width_pt: 3.0
    color: "primary"
  - x0_mm: 21.9
    y_mm: 193.3
    x1_mm: 80.1
    width_pt: 0.75
    color: "primary"

text_zones:
  # Sectietitel (bruin)
  - bind: _static.Voorziening en objecten beschrijving
    x_mm: 21.9
    y_mm: 31.0
    font: heading
    size: 10
    color: "secondary"

  # Locatienaam rechtsboven
  - bind: location.name
    x_mm: 275.0
    y_mm: 31.0
    font: heading
    size: 10
    color: "primary"
    align: right

  # === Footer ===
  - bind: client.name
    x_mm: 13.5
    y_mm: 185.0
    font: heading
    size: 10
    color: "white"

  - bind: _page_number
    x_mm: 229.2
    y_mm: 186.5
    font: heading
    size: 12
    color: "white"
    align: right

  - bind: meta.rapportkop_locatie
    x_mm: 13.5
    y_mm: 193.1
    font: heading
    size: 10
    color: "white"

table:
  data_bind: objecten
  origin:
    x_mm: 21.9
    y_mm: 36.7
  row_height_mm: 5.6
  max_y_mm: 180
  show_header: true
  header_font: heading
  header_size: 8
  header_color: "secondary"
  body_font: body
  body_size: 8
  body_color: "secondary"
  columns:
    - { field: "Voorziening", header: "Voorziening", width_mm: 21, align: left }
    - { field: "Type", header: "Type", width_mm: 34, align: left }
    - { field: "Status", header: "Status", width_mm: 30, align: left }
    - { field: "Object", header: "Object", width_mm: 18, align: left }
    - { field: "Type2", header: "Type", width_mm: 28, align: left }
    - { field: "Beschrijving", header: "Beschrijving", width_mm: 78, align: left }
    - { field: "Gebouw", header: "Gebouw", width_mm: 23, align: left }
    - { field: "Ruimte", header: "Ruimte", width_mm: 23, align: left }
