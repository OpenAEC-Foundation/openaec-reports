# Symitech BIC Factuur template
# ==============================
# Gebaseerd op: 336.01-BIC Factuur_BIC.pdf
# 6 pagina's: cover, locatie, BIC controles, detail weergave (L),
# objecten beschrijving (L), backcover

report_type: bic_factuur
tenant: symitech
format: A4
orientation: portrait

cover:
  subtitle_hint: "BIC Factuur"
colofon:
  enabled: false
toc:
  enabled: false
backcover:
  enabled: true

structure:
  - cover
  - sections
  - backcover

# Sectie-presets: de vaste paginastructuur van een BIC Factuur
section_presets:
  - title: "Locatie"
    description: "Locatiegegevens, opdrachtgever en locatiefoto"
    default_blocks:
      - type: location_detail

  - title: "BIC Controles"
    description: "Kostenopgave BIC controles (conform opdracht vs werkelijk)"
    default_blocks:
      - type: bic_table

  - title: "Detail weergave"
    description: "Detail log per BIC controle (landscape)"
    orientation: landscape
    default_blocks:
      - type: table
        title: "Detail weergave"
        headers:
          - "BIC Controle nummer"
          - "Type"
          - "Datum"
          - "BIC controle"
          - "Int. inspectie"
          - "Reiniging"
          - "Additioneel"
        rows: []
        style: "default"

  - title: "Voorziening en objecten beschrijving"
    description: "Overzicht voorzieningen en objecten (landscape)"
    orientation: landscape
    default_blocks:
      - type: table
        title: "Voorziening en objecten beschrijving"
        headers:
          - "Voorziening"
          - "Type"
          - "Status"
          - "Object"
          - "Type"
          - "Beschrijving"
          - "Gebouw"
          - "Ruimte"
        rows: []
        style: "default"
