# Docker Compose — Authentik SSO + OpenAEC Reports
#
# Gebruik:
#   docker compose -f docker-compose.authentik.yml up -d
#
# Services:
#   - authentik-server:  Authentik web UI + API (auth.3bm.co.nl)
#   - authentik-worker:  Authentik background tasks
#   - postgresql:        Database voor Authentik
#   - redis:             Cache/broker voor Authentik
#   - openaec-reports:   Report generator API + frontend (report.3bm.co.nl)
#
# Vereist:
#   - .env bestand met secrets (zie onderaan voor voorbeeld)
#   - Caddy/Nginx reverse proxy voor TLS en domain routing
#
# Authentik configuratie (na eerste start):
#   1. Open https://auth.3bm.co.nl/if/flow/initial-setup/
#   2. Maak admin account aan
#   3. Maak Application "openaec-reports" aan
#   4. Provider: OAuth2/OIDC, Client type: Public (SPA)
#   5. Redirect URIs:
#      - https://report.3bm.co.nl/auth/callback
#      - http://localhost:5173/auth/callback (development)
#   6. Scopes: openid, profile, email, openaec_profile
#   7. Custom scope mapping "openaec_profile":
#      Expression: return {"job_title": request.user.attributes.get("job_title", ""),
#                          "phone": request.user.attributes.get("phone", ""),
#                          "registration_number": request.user.attributes.get("registration_number", ""),
#                          "company": request.user.attributes.get("company", ""),
#                          "tenant": request.user.attributes.get("tenant", "")}

services:
  # --- Authentik ---
  postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - authentik_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS:?Set AUTHENTIK_PG_PASS in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12
    restart: unless-stopped
    command: server
    ports:
      - "9000:9000"     # HTTP (achter reverse proxy)
      - "9443:9443"     # HTTPS (optioneel, direct access)
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?Set AUTHENTIK_SECRET_KEY in .env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- OpenAEC Reports ---
  openaec-reports:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Auth
      OPENAEC_JWT_SECRET: ${OPENAEC_JWT_SECRET:?Set OPENAEC_JWT_SECRET in .env}
      OPENAEC_COOKIE_DOMAIN: ${OPENAEC_COOKIE_DOMAIN:-.3bm.co.nl}
      OPENAEC_COOKIE_SECURE: "true"
      # OIDC (Authentik)
      OPENAEC_OIDC_ISSUER: ${OPENAEC_OIDC_ISSUER:-https://auth.3bm.co.nl/application/o/openaec-reports/}
      OPENAEC_OIDC_CLIENT_ID: ${OPENAEC_OIDC_CLIENT_ID:-openaec-reports}
      # CORS
      CORS_ORIGINS: "https://report.3bm.co.nl,http://localhost:5173"
      # Tenants
      OPENAEC_TENANTS_ROOT: /app/tenants
      OPENAEC_TENANT_DIR: /app/tenants/3bm_cooperatie
    volumes:
      - openaec_data:/app/data
      - openaec_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  authentik_db:
  authentik_redis:
  authentik_media:
  authentik_templates:
  openaec_data:
  openaec_uploads:

# --- .env voorbeeld ---
# AUTHENTIK_SECRET_KEY=<genereer met: openssl rand -base64 36>
# AUTHENTIK_PG_PASS=<sterk wachtwoord>
# OPENAEC_JWT_SECRET=<genereer met: openssl rand -base64 36>
# OPENAEC_OIDC_ISSUER=https://auth.3bm.co.nl/application/o/openaec-reports/
# OPENAEC_OIDC_CLIENT_ID=openaec-reports
# OPENAEC_COOKIE_DOMAIN=.3bm.co.nl
