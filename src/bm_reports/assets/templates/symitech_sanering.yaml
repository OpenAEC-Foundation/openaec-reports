format: A4
orientation: portrait

cover:
  subtitle_hint: "Saneringsrapportage"
colofon:
  enabled: true
toc:
  enabled: true
  title: "Inhoudsopgave"
backcover:
  enabled: true

structure:
  - cover
  - colofon
  - toc
  - sections
