# Symitech BIC Factuur — BIC controle resultaten (content portrait)
# Pixel-exact gemeten uit content_portrait_reference.pdf (2026-03-01)
# Stationery: SCHOON canvas (alleen header/footer grafische balk)
# Engine rendert: ALLES — labels, waarden, sectie-lijnen, subtotaal-lijnen
#
# Coördinaten: PyMuPDF top-down pt → mm (×0.352778)
# Pagina: A4 portrait 595.3×841.9pt (210×297mm)
#
# === Lijn-patronen ===
# Blauwe dubbele lijn (sectie-scheiding): 3.0pt + 0.75pt, x=49.7→227.2pt
# Bruine enkele lijn (subtotaal):         2.25pt, x=283.5→545.8pt
#
# === Kolom layout ===
# Labels links:              x=55.2pt (19.5mm)
# Conform opdracht (right):  x=420.0pt (148.2mm) → drawRightString
# Werkelijke kosten (right):  x=540.5pt (190.6mm) → drawRightString

name: bic_controles
stationery: content_portrait_stationery.pdf

# ============================================================
# Decoratieve lijnen (sectie-scheidingen en subtotaal-strepen)
# ============================================================
line_zones:
  # --- Sectie "BIC Controles" dubbele lijn ---
  # Dikke lijn: y=125.5pt → 44.3mm
  - x0_mm: 17.5
    y_mm: 44.3
    x1_mm: 80.1
    width_pt: 3.0
    color: "primary"
  # Dunne lijn: y=128.2pt → 45.2mm
  - x0_mm: 17.5
    y_mm: 45.2
    x1_mm: 80.1
    width_pt: 0.75
    color: "primary"

  # --- Subtotaal BIC controles: y=233.2pt → 82.2mm ---
  - x0_mm: 100.0
    y_mm: 82.2
    x1_mm: 192.5
    width_pt: 2.25
    color: "secondary"

  # --- Sectie "Reinigen tijdens BIC" dubbele lijn ---
  # Dikke lijn: y=281.8pt → 99.4mm
  - x0_mm: 17.5
    y_mm: 99.4
    x1_mm: 80.1
    width_pt: 3.0
    color: "primary"
  # Dunne lijn: y=284.5pt → 100.3mm
  - x0_mm: 17.5
    y_mm: 100.3
    x1_mm: 80.1
    width_pt: 0.75
    color: "primary"

